<!DOCTYPE html>
<html>
<head>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    color: var(--figma-color-text, #333);
    background: var(--figma-color-bg, #fff);
    padding: 16px;
  }
  h2 { font-size: 16px; font-weight: 600; margin-bottom: 12px; }
  .section { margin-bottom: 16px; }
  .section-title { font-weight: 600; margin-bottom: 8px; font-size: 12px; color: var(--figma-color-text-secondary, #666); text-transform: uppercase; letter-spacing: 0.5px; }

  .scale-row { display: flex; gap: 8px; margin-bottom: 12px; }
  .scale-btn {
    flex: 1; padding: 8px; border: 1px solid var(--figma-color-border, #ddd);
    border-radius: 6px; background: var(--figma-color-bg-secondary, #f5f5f5);
    cursor: pointer; text-align: center; font-size: 13px; font-weight: 500;
    transition: all 0.15s;
  }
  .scale-btn:hover { border-color: var(--figma-color-border-brand, #0d99ff); }
  .scale-btn.active { background: var(--figma-color-bg-brand, #0d99ff); color: #fff; border-color: transparent; }

  .export-btn {
    width: 100%; padding: 12px; border: none; border-radius: 8px;
    background: var(--figma-color-bg-brand, #0d99ff); color: #fff;
    font-size: 14px; font-weight: 600; cursor: pointer;
    transition: opacity 0.15s;
  }
  .export-btn:hover { opacity: 0.9; }
  .export-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .status {
    margin-top: 12px; padding: 10px; border-radius: 6px;
    background: var(--figma-color-bg-secondary, #f5f5f5);
    font-size: 12px; min-height: 36px;
    display: flex; align-items: center;
  }
  .status.success { background: #e6f9e6; color: #1a7a1a; }
  .status.error { background: #fde8e8; color: #c53030; }

  .info {
    padding: 10px; border-radius: 6px; margin-bottom: 12px;
    background: var(--figma-color-bg-secondary, #f5f5f5);
    font-size: 12px; line-height: 1.5;
  }

  .progress-bar {
    width: 100%; height: 4px; border-radius: 2px;
    background: var(--figma-color-border, #ddd);
    margin-top: 8px; overflow: hidden; display: none;
  }
  .progress-bar .fill {
    height: 100%; background: var(--figma-color-bg-brand, #0d99ff);
    border-radius: 2px; transition: width 0.3s;
    width: 0%;
  }
</style>
</head>
<body>
  <h2>SoobakFigma2Unity Export</h2>

  <div class="info">
    Select frames in Figma, then click Export.<br>
    A <strong>.soobak</strong> folder will be generated for Unity import.
  </div>

  <div class="section">
    <div class="section-title">Image Scale</div>
    <div class="scale-row">
      <button class="scale-btn" data-scale="1" onclick="setScale(1)">1x</button>
      <button class="scale-btn active" data-scale="2" onclick="setScale(2)">2x</button>
      <button class="scale-btn" data-scale="3" onclick="setScale(3)">3x</button>
      <button class="scale-btn" data-scale="4" onclick="setScale(4)">4x</button>
    </div>
  </div>

  <button class="export-btn" id="exportBtn" onclick="startExport()">
    Export Selected Frames
  </button>

  <div class="progress-bar" id="progressBar">
    <div class="fill" id="progressFill"></div>
  </div>

  <div class="status" id="status">Ready. Select frames and click Export.</div>

<script>
  let currentScale = 2;

  function setScale(s) {
    currentScale = s;
    document.querySelectorAll('.scale-btn').forEach(btn => {
      btn.classList.toggle('active', parseInt(btn.dataset.scale) === s);
    });
  }

  function startExport() {
    const btn = document.getElementById('exportBtn');
    btn.disabled = true;
    btn.textContent = 'Exporting...';
    setStatus('Starting export...');
    showProgress(true);
    parent.postMessage({ pluginMessage: { type: 'export', scale: currentScale } }, '*');
  }

  function setStatus(msg, type) {
    const el = document.getElementById('status');
    el.textContent = msg;
    el.className = 'status' + (type ? ' ' + type : '');
  }

  function showProgress(show) {
    document.getElementById('progressBar').style.display = show ? 'block' : 'none';
  }

  function setProgress(pct) {
    document.getElementById('progressFill').style.width = pct + '%';
  }

  // ─── Handle messages from plugin code ─────────────────
  window.onmessage = async (event) => {
    const msg = event.data.pluginMessage;
    if (!msg) return;

    if (msg.type === 'status') {
      setStatus(msg.message);
    }

    if (msg.type === 'export-ready') {
      setStatus('Preparing download...');
      setProgress(80);

      try {
        await downloadExport(msg.manifest, msg.images, msg.fileName);
        setStatus('Export complete! Open the .soobak folder in Unity.', 'success');
        setProgress(100);
      } catch (e) {
        setStatus('Download failed: ' + e.message, 'error');
      }

      const btn = document.getElementById('exportBtn');
      btn.disabled = false;
      btn.textContent = 'Export Selected Frames';
      setTimeout(() => showProgress(false), 1000);
    }
  };

  // ─── Download as ZIP-like structure ───────────────────
  async function downloadExport(manifestJson, images, fileName) {
    // Create a zip-like structure using JSZip if available,
    // or fall back to individual file downloads.
    // For simplicity, we'll create a single JSON with embedded base64 images
    // that the Unity importer can unpack.

    const manifest = JSON.parse(manifestJson);

    // Embed images as base64 in the manifest for single-file export
    const embeddedImages = {};
    for (const img of images) {
      const bytes = new Uint8Array(img.data);
      let binary = '';
      for (let i = 0; i < bytes.length; i++) {
        binary += String.fromCharCode(bytes[i]);
      }
      embeddedImages[img.name] = btoa(binary);
    }

    const exportData = {
      manifest: manifest,
      embeddedImages: embeddedImages,
    };

    const blob = new Blob([JSON.stringify(exportData)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `${fileName}.soobak.json`;
    a.click();
    URL.revokeObjectURL(url);

    setProgress(100);
  }

  // Request initial page tree
  parent.postMessage({ pluginMessage: { type: 'get-pages' } }, '*');
</script>
</body>
</html>
